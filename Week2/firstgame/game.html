<!DOCTYPE html>
<html>
    <head>
        <title>BATTLE!</title>
    </head>
    <body class="battle" style="background-color: #2d1b00; font-family: monospace; color: #e0c872;">

        <h1 id="night-king">A WILD NIGHT KING APPEARS</h1>

        <section class="enemy">
            <h2>Night King</h2>
            <h3>10/10 HP</h3>
        </section>

        <div style="background-color: #4a0e0e; padding: 3px;"><p>&nbsp;</p></div>

        <section class="player">
            <h2>Jon Snow</h2>
            <ol>
                <li><button style="background-color: #4a0e0e; color: #e0c872; border: 1px solid #e0c872; padding: 8px 16px; cursor: pointer; font-family: monospace;">FIGHT (Longclaw)</button></li>
                <li>
                    <label id="item" for="item-select" style="color: #e0c872;">ITEM</label>
                    <select id="item-select" style="background-color: #4a0e0e; color: #e0c872; border: 1px solid #e0c872; font-family: monospace;">
                        <option value="dragonglass">DRAGONGLASS</option>
                        <option value="wildfire">WILDFIRE</option>
                        <option value="milk-of-poppy">MILK OF THE POPPY</option>
                    </select>
                </li>
                <li><button style="background-color: #4a0e0e; color: #e0c872; border: 1px solid #e0c872; padding: 8px 16px; cursor: pointer; font-family: monospace;">SWITCH (Daenerys)</button></li>
                <li><button style="background-color: #4a0e0e; color: #e0c872; border: 1px solid #e0c872; padding: 8px 16px; cursor: pointer; font-family: monospace;">FLEE</button></li>
            </ol>
        </section>

    </body>
</html>
